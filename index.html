<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Guidebook - Velkommen</title>
  <link rel="stylesheet" href="Style.css">
  <style>
    /* front page specific */
    body.frontpage {
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
      color: #fff;
    }
    .front-content {
      text-align: center;
      animation: fadeIn 1.2s ease forwards;
    }
    .front-title {
      font-size: 3rem;
      background: linear-gradient(90deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      animation: slideDown 1s ease;
    }
    .front-subtitle {
      font-size: 1.2rem;
      margin: 1rem 0 2rem;
      animation: slideUp 1s ease 0.3s backwards;
    }
    .enter-btn {
      background: linear-gradient(90deg, #00a8ff, #00d4ff);
      color: #fff;
      border: none;
      padding: 15px 40px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 150, 255, 0.4);
      animation: slideUp 1s ease 0.6s backwards;
    }
    .enter-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 150, 255, 0.6);
    }
  </style>
</head>
<body class="frontpage">
  <div class="front-content">
    <h1 class="front-title">Velkommen til AI Guidebook</h1>
    <p class="front-subtitle">Trykk nedenfor for å utforske alt om kunstig intelligens</p>
    <button class="enter-btn" onclick="goToContent()">Gå videre</button>
  </div>
  <script>
    function goToContent() {
      document.body.style.animation = 'fadeOut 0.8s ease forwards';
      setTimeout(() => {
        window.location.href = 'bror.html';
      }, 800);
    }
  </script>
</body>
</html>
